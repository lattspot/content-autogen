<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R-Content AutoGen — 콘텐츠 자동 생성기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #0F2044; --navyMid: #1A3260; --blue: #2563EB;
  --bluePale: #D6E4F7; --blueFaint: #EBF2FC;
  --white: #FFFFFF; --offWhite: #F7F9FC;
  --gray100: #F1F5F9; --gray200: #E2E8F0;
  --gray400: #94A3B8; --gray600: #475569; --gray800: #1E293B;
  --border: rgba(15,32,68,0.1); --shadow: 0 4px 20px rgba(15,32,68,0.08);
  --green: #059669; --greenPale: #ECFDF5;
  --linkedin: #0A66C2; --linkedinPale: #E8F0FB;
}
body { font-family: 'Noto Sans KR', sans-serif; background: var(--offWhite); color: var(--gray800); min-height: 100vh; }



.header {
  background: var(--navy); padding: 0 2rem; height: 58px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(15,32,68,0.2);
}
.logo { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 700; color: var(--white); letter-spacing: 0.06em; }
.logo-mark { width: 28px; height: 28px; border-radius: 7px; background: var(--blue); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; color: var(--white); }
.header-badge { font-size: 11px; padding: 4px 12px; border-radius: 20px; background: rgba(37,99,235,0.2); color: #93B3D8; border: 1px solid rgba(37,99,235,0.3); }

.container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; display: grid; grid-template-columns: 380px 1fr; gap: 1.5rem; align-items: start; }

.panel { background: var(--white); border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow); overflow: hidden; }
.panel-header { padding: 1rem 1.25rem 0.75rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.panel-header h2 { font-size: 14px; font-weight: 700; color: var(--navy); }
.panel-icon { width: 28px; height: 28px; border-radius: 8px; background: var(--blueFaint); display: flex; align-items: center; justify-content: center; font-size: 14px; }
.panel-body { padding: 1.25rem; }

.field { margin-bottom: 1.1rem; }
.field label { display: block; font-size: 11px; font-weight: 700; color: var(--gray400); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }

.chip-group { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { padding: 6px 13px; border-radius: 20px; border: 1px solid var(--gray200); background: var(--white); color: var(--gray600); font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; font-family: 'Noto Sans KR', sans-serif; }
.chip:hover { border-color: var(--blue); color: var(--blue); }
.chip.active { background: var(--navy); color: var(--white); border-color: var(--navy); }
.chip.ch-linkedin.active { background: var(--linkedin); border-color: var(--linkedin); }
.chip.ch-blog.active { background: var(--green); border-color: var(--green); }
.chip.ch-both.active { background: var(--navy); border-color: var(--navy); }

.input-field { width: 100%; padding: 9px 12px; border: 1px solid var(--gray200); border-radius: 9px; font-size: 13px; font-family: 'Noto Sans KR', sans-serif; color: var(--gray800); background: var(--offWhite); outline: none; transition: border-color 0.15s, background 0.15s; }
.input-field:focus { border-color: var(--blue); background: var(--white); box-shadow: 0 0 0 3px rgba(37,99,235,0.08); }
.input-field::placeholder { color: var(--gray400); }
.input-field.error { border-color: #DC2626; }

.textarea-field { width: 100%; padding: 9px 12px; border: 1px solid var(--gray200); border-radius: 9px; font-size: 12px; font-family: 'Noto Sans KR', sans-serif; color: var(--gray800); background: var(--offWhite); outline: none; resize: vertical; min-height: 72px; transition: border-color 0.15s; line-height: 1.6; }
.textarea-field:focus { border-color: var(--blue); background: var(--white); box-shadow: 0 0 0 3px rgba(37,99,235,0.08); }
.textarea-field::placeholder { color: var(--gray400); }
.char-count { font-size: 10px; color: var(--gray400); text-align: right; margin-top: 3px; }

.gen-btn { width: 100%; padding: 13px; border-radius: 10px; background: var(--blue); color: var(--white); font-size: 14px; font-weight: 700; border: none; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 0.25rem; }
.gen-btn:hover { background: #1D4ED8; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37,99,235,0.3); }
.gen-btn:active { transform: scale(0.98); }
.gen-btn:disabled { background: var(--gray200); color: var(--gray400); cursor: not-allowed; transform: none; box-shadow: none; }

@keyframes spin { to { transform: rotate(360deg); } }
.spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }

.result-panel { position: sticky; top: 74px; }

.empty-state { padding: 4rem 2rem; display: flex; flex-direction: column; align-items: center; gap: 12px; text-align: center; }
.empty-icon { font-size: 48px; opacity: 0.2; }
.empty-title { font-size: 15px; font-weight: 600; color: var(--gray400); }
.empty-sub { font-size: 13px; color: var(--gray400); line-height: 1.7; }

.result-tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 1rem; }
.result-tab { padding: 12px 16px; font-size: 13px; font-weight: 500; color: var(--gray400); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; display: flex; align-items: center; gap: 6px; user-select: none; }
.result-tab:hover { color: var(--gray800); }
.result-tab.active { color: var(--navy); border-bottom-color: var(--blue); font-weight: 700; }

.result-content { display: none; padding: 1.25rem; }
.result-content.active { display: block; }

.result-card { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 1rem; }
.result-card-header { padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: var(--offWhite); }
.result-card-title { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 700; }
.linkedin-badge { padding: 3px 10px; border-radius: 20px; background: var(--linkedinPale); color: var(--linkedin); font-size: 11px; font-weight: 700; }
.blog-badge { padding: 3px 10px; border-radius: 20px; background: var(--greenPale); color: var(--green); font-size: 11px; font-weight: 700; }
.copy-btn { padding: 4px 12px; border-radius: 6px; border: 1px solid var(--gray200); background: var(--white); font-size: 11px; font-weight: 500; color: var(--gray600); cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s; }
.copy-btn:hover { background: var(--blueFaint); border-color: var(--blue); color: var(--blue); }
.copy-btn.copied { background: var(--greenPale); border-color: var(--green); color: var(--green); }

.result-body { padding: 16px; font-size: 13px; line-height: 1.9; color: var(--gray800); white-space: pre-wrap; background: var(--white); max-height: 420px; overflow-y: auto; }

.meta-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
.meta-chip { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; background: var(--blueFaint); color: var(--blue); border: 1px solid var(--bluePale); }

@keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
.skeleton { border-radius: 6px; background: linear-gradient(90deg, var(--gray100) 25%, var(--gray200) 50%, var(--gray100) 75%); background-size: 800px 100%; animation: shimmer 1.5s infinite; margin-bottom: 10px; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
.fade-in { animation: fadeIn 0.4s ease both; }

.history-item { padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: space-between; }
.history-item:hover { border-color: var(--blue); background: var(--blueFaint); }
.history-kw { font-size: 13px; font-weight: 600; color: var(--navy); }
.history-meta { font-size: 11px; color: var(--gray400); margin-top: 2px; }
.history-time { font-size: 11px; color: var(--gray400); flex-shrink: 0; }

.result-footer { font-size: 11px; color: var(--gray400); text-align: right; margin-top: 6px; padding: 0 2px; }

@media (max-width: 900px) { .container { grid-template-columns: 1fr; } .result-panel { position: static; } }
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-mark">R</div>
    R-Content AutoGen
  </div>
  <span class="header-badge">Powered by Claude AI</span>
</header>

<div class="container">

  <!-- 왼쪽 입력 패널 -->
  <div>
    <div class="panel">
      <div class="panel-header">
        <div class="panel-icon">⚙️</div>
        <h2>콘텐츠 설정</h2>
      </div>
      <div class="panel-body">

        <div class="field">
          <label>콘텐츠 유형</label>
          <div class="chip-group" id="typeGroup">
            <button class="chip active" data-val="고객 사례">📋 고객 사례</button>
            <button class="chip" data-val="산업 트렌드">📈 산업 트렌드</button>
            <button class="chip" data-val="제품 기능">🛠 제품 기능</button>
            <button class="chip" data-val="이벤트 홍보">🎯 이벤트 홍보</button>
            <button class="chip" data-val="뉴스 코멘트">📰 뉴스 코멘트</button>
          </div>
        </div>

        <div class="field">
          <label>핵심 키워드</label>
          <input class="input-field" id="keyword" placeholder="예: 원격지원, 화상회의, 보안" maxlength="100" oninput="updateCharCount(this,'kwCount')"/>
          <div class="char-count" id="kwCount">0 / 100</div>
        </div>

        <div class="field">
          <label>추가 맥락 (선택)</label>
          <textarea class="textarea-field" id="context" placeholder="예: 최근 공공기관 원격지원 계약 체결, 보안 강화 기능 추가..." maxlength="300" oninput="updateCharCount(this,'ctxCount')"></textarea>
          <div class="char-count" id="ctxCount">0 / 300</div>
        </div>

        <div class="field">
          <label>톤 (Tone)</label>
          <div class="chip-group" id="toneGroup">
            <button class="chip active" data-val="전문가적">🎩 전문가적</button>
            <button class="chip" data-val="친근하고 공감가는">😊 친근한</button>
            <button class="chip" data-val="기술 중심적">💻 기술중심</button>
            <button class="chip" data-val="스토리텔링">📖 스토리</button>
          </div>
        </div>

        <div class="field">
          <label>출력 채널</label>
          <div class="chip-group" id="channelGroup">
            <button class="chip ch-linkedin active" data-val="linkedin">💼 LinkedIn</button>
            <button class="chip ch-blog" data-val="blog">✍️ 블로그</button>
            <button class="chip ch-both" data-val="both">✨ 둘 다</button>
          </div>
        </div>

        <div class="field">
          <label>타겟 독자</label>
          <div class="chip-group" id="targetGroup">
            <button class="chip active" data-val="IT 담당자">IT 담당자</button>
            <button class="chip" data-val="C레벨 임원">C레벨</button>
            <button class="chip" data-val="중소기업 대표">SMB 대표</button>
            <button class="chip" data-val="일반 직장인">일반 직장인</button>
          </div>
        </div>

        <button class="gen-btn" id="genBtn" onclick="generateContent()">
          <span>✨</span>
          <span id="btnText">콘텐츠 자동 생성</span>
        </button>

      </div>
    </div>

    <!-- 생성 이력 -->
    <div class="panel" style="margin-top:1rem;">
      <div class="panel-header">
        <div class="panel-icon">🕐</div>
        <h2>최근 생성 이력</h2>
      </div>
      <div class="panel-body" id="historyList">
        <div style="text-align:center;padding:1rem;font-size:12px;color:var(--gray400)">생성된 이력이 없습니다</div>
      </div>
    </div>
  </div>

  <!-- 오른쪽 결과 패널 -->
  <div class="panel result-panel">
    <div id="emptyState" class="empty-state">
      <div class="empty-icon">✨</div>
      <div class="empty-title">콘텐츠를 생성해 보세요</div>
      <div class="empty-sub">키워드와 설정을 입력하고<br>자동 생성 버튼을 누르면<br>LinkedIn 포스트와 블로그 글을<br>Claude AI가 즉시 만들어 드립니다.</div>
    </div>

    <div id="loadingState" style="display:none;padding:1.5rem;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;">
        <div class="spinner" style="border-color:rgba(37,99,235,0.2);border-top-color:var(--blue);"></div>
        <span style="font-size:13px;color:var(--blue);font-weight:600;" id="loadingMsg">Claude AI가 콘텐츠를 구성하는 중...</span>
      </div>
      <div class="skeleton" style="height:18px;width:75%;"></div>
      <div class="skeleton" style="height:18px;width:92%;"></div>
      <div class="skeleton" style="height:18px;width:58%;"></div>
      <div class="skeleton" style="height:18px;width:85%;margin-top:14px;"></div>
      <div class="skeleton" style="height:18px;width:78%;"></div>
      <div class="skeleton" style="height:18px;width:93%;"></div>
      <div class="skeleton" style="height:18px;width:62%;"></div>
      <div class="skeleton" style="height:18px;width:80%;margin-top:14px;"></div>
      <div class="skeleton" style="height:18px;width:70%;"></div>
    </div>

    <div id="resultState" style="display:none;">
      <div class="result-tabs" id="resultTabs"></div>
      <div id="resultContents"></div>
    </div>
  </div>
</div>

<script>
// ── 예시 콘텐츠 데이터베이스 ─────────────────────
const DEMO_CONTENT = {
  "고객 사례": {
    linkedin: `🏢 공공기관의 원격지원, 이렇게 바뀌었습니다.

A 지방자치단체 IT팀은 매일 반복되는 문제로 고민이었습니다.
전국 200개 지사 직원들의 PC 장애 처리에 평균 4시간이 소요됐고, 출장 비용만 연간 1억 원이 넘었습니다.

IT 담당자 K 과장의 한마디:

원격지원은 단순한 도구가 아닙니다.
업무 방식 자체를 바꾸는 인프라입니다.

여러분의 조직은 어떤 IT 지원 방식을 사용하고 계신가요? 💬

#원격지원 #RemoteView #알서포트 #디지털전환 #공공IT #업무효율화`,

    blog: `# 공공기관 원격지원 도입 사례: A 지자체의 IT 혁신 스토리

## 도입 배경: 반복되는 비효율의 악순환

전국 200개 지사를 운영하는 A 지방자치단체 IT팀은 만성적인 문제에 시달리고 있었습니다. 직원 PC 장애가 발생할 때마다 IT 담당자가 직접 현장을 방문해야 했고, 이로 인한 평균 처리 시간은 4시간에 달했습니다. 연간 출장 비용은 1억 원을 훌쩍 넘었고, IT 인력은 이동 시간에만 하루의 절반을 쏟아붓고 있었습니다.

문제는 비용만이 아니었습니다. 장애 처리가 늦어질수록 업무 공백이 생기고, 직원들의 불만은 쌓여만 갔습니다.

## 해결책: 알서포트 RemoteView 도입

2023년 초, A 지자체는 알서포트의 RemoteView를 전사 도입하기로 결정했습니다. 선택 기준은 세 가지였습니다.

**첫째, 보안성.** 공공기관 특성상 CC인증과 ISMS 인증이 필수였습니다. RemoteView는 국내 원격지원 솔루션 중 가장 많은 보안 인증을 보유하고 있었습니다.

**둘째, 사용 편의성.** IT에 익숙하지 않은 지방 지사 직원들도 쉽게 연결 요청을 보낼 수 있어야 했습니다.

**셋째, 안정성.** 하루에도 수십 건의 동시 접속이 발생하는 환경에서 끊김 없는 서비스가 필요했습니다.

## 도입 6개월 후: 숫자로 보는 변화

도입 후 6개월이 지났을 때, 결과는 놀라웠습니다.

- **장애 처리 시간**: 평균 4시간 → 23분 (94% 단축)
- **연간 출장 비용**: 1억 2천만 원 → 약 200만 원
- **IT 담당자 이동 시간**: 하루 평균 3.5시간 → 0.3시간
- **직원 만족도 점수**: 6개월 만에 32% 상승

"처음에는 '원격으로 정말 다 해결이 될까?' 반신반의했습니다. 특히 나이 드신 직원분들이 연결 방법을 어려워하실 것 같았는데, 링크 하나 보내드리면 클릭만으로 연결되니까 오히려 현장에서 더 좋아하시더라고요. 이제는 RemoteView 없이 어떻게 일했나 싶습니다."

## 시작하려는 조직을 위한 조언

원격지원 시스템 도입을 고민하는 기관이라면 먼저 **파일럿 운영**을 권장합니다. 알서포트는 30일 무료 체험을 제공하며, 도입 전 전담 컨설팅도 지원합니다. 조직 규모와 업무 환경에 맞는 맞춤 설정으로 빠르게 효과를 체감할 수 있습니다.

원격지원은 더 이상 선택이 아닌 필수 인프라입니다. 여러분의 조직도 변화를 시작해 보세요.

*알서포트 RemoteView 도입 문의: www.rsupport.com | 1588-0800*`

  "산업 트렌드": {
    linkedin: `📊 2024년 원격근무 트렌드, 숫자로 읽는다.

- 연간 환산: **약 6,048만 원**

직원이 1,000명이라면 연간 6억 원 규모의 보이지 않는 손실입니다.

## 왜 이 문제가 계속 방치될까?

재미있는 건, 많은 기업들이 이 비용을 '측정하지 않는다'는 점입니다. IT 장애로 인한 생산성 손실은 급여 명세서에 찍히지 않습니다. 출장비처럼 영수증이 남지도 않습니다. 그래서 '어쩔 수 없는 것'으로 인식됩니다.

하지만 이건 명백히 해결 가능한 문제입니다.

## 알서포트의 접근: 처리 시간 2.8시간 → 23분

알서포트 RemoteView를 도입한 기업들의 평균 IT 장애 처리 시간은 **23분**입니다.

같은 공식으로 계산하면:
- 월 총 생산성 손실: 168시간 → **23시간**
- 월 비용: 504만 원 → **69만 원**
- **월 435만 원, 연 5,200만 원 절감**

RemoteView의 연간 이용료보다 절감 금액이 훨씬 큰 경우가 대부분입니다.

## 경영진을 설득하는 법

IT 투자를 요청할 때 "편리해진다"는 논리는 약합니다. ROI 수치로 말하세요.

"직원 100명 기준, 연간 5,200만 원의 생산성 손실을 막을 수 있습니다. RemoteView 도입 비용 대비 ROI는 약 800%입니다."

이런 언어가 경영진의 결재를 이끌어냅니다.

---
*참고: IDC 'Hybrid Work IT Productivity Report 2024' / 알서포트 1,200개 도입 사례 분석*`
  }
};

// ── 칩 그룹 초기화 ─────────────────────────────
function initChipGroup(groupId) {
  document.getElementById(groupId).querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.getElementById(groupId).querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
    });
  });
}
['typeGroup','toneGroup','channelGroup','targetGroup'].forEach(initChipGroup);

function getActive(groupId) {
  const el = document.querySelector(`#${groupId} .chip.active`);
  return el ? el.dataset.val : '';
}
function updateCharCount(el, id) {
  document.getElementById(id).textContent = `${el.value.length} / ${el.maxLength}`;
}

// ── 이력 ──────────────────────────────────────
const historyItems = [];
function addHistory(kw, type, channel) {
  const now = new Date();
  const t = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  historyItems.unshift({ kw, type, channel, t });
  if (historyItems.length > 5) historyItems.pop();
  const el = document.getElementById('historyList');
  el.innerHTML = historyItems.map(h => `
    <div class="history-item">
      <div>
        <div class="history-kw">${h.kw || '(키워드 없음)'}</div>
        <div class="history-meta">${h.type} · ${h.channel==='linkedin'?'LinkedIn':h.channel==='blog'?'블로그':'둘 다'}</div>
      </div>
      <div class="history-time">${h.t}</div>
    </div>`).join('');
}

// ── 탭 전환 ───────────────────────────────────
function switchTab(id) {
  document.querySelectorAll('.result-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.result-content').forEach(c => c.classList.remove('active'));
  document.querySelector(`.result-tab[data-tab="${id}"]`)?.classList.add('active');
  document.getElementById(`tab-${id}`)?.classList.add('active');
}

// ── 복사 ──────────────────────────────────────
function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ 복사됨';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 2000);
  });
}

// ── 결과 렌더 ─────────────────────────────────
function renderResults(results) {
  const tabs = document.getElementById('resultTabs');
  const contents = document.getElementById('resultContents');
  tabs.innerHTML = ''; contents.innerHTML = '';

  results.forEach((r, i) => {
    const tab = document.createElement('div');
    tab.className = 'result-tab' + (i===0?' active':'');
    tab.dataset.tab = r.id;
    tab.innerHTML = `${r.icon} ${r.label}`;
    tab.onclick = () => switchTab(r.id);
    tabs.appendChild(tab);

    const c = document.createElement('div');
    c.className = 'result-content fade-in' + (i===0?' active':'');
    c.id = `tab-${r.id}`;
    const safeText = r.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const copyText_ = r.text.replace(/`/g,'\\`').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    c.innerHTML = `
      <div class="meta-row">
        ${r.chips.map(ch=>`<span class="meta-chip">${ch}</span>`).join('')}
      </div>
      <div class="result-card">
        <div class="result-card-header">
          <div class="result-card-title">${r.icon} <span>${r.label}</span> <span class="${r.badgeCls}">${r.badgeTxt}</span></div>
          <button class="copy-btn" onclick="copyText(this, \`${copyText_}\`)">복사</button>
        </div>
        <div class="result-body">${safeText}</div>
      </div>
      <div class="result-footer">글자 수: ${r.text.length}자 &nbsp;·&nbsp; Claude AI 생성 (데모)</div>`;
    contents.appendChild(c);
  });
}

// ── 메인 생성 함수 ─────────────────────────────
function generateContent() {
  const keyword = document.getElementById('keyword').value.trim();
  const type    = getActive('typeGroup');
  const channel = getActive('channelGroup');
  const tone    = getActive('toneGroup');
  const target  = getActive('targetGroup');

  if (!keyword) {
    const kw = document.getElementById('keyword');
    kw.classList.add('error');
    kw.placeholder = '키워드를 입력해 주세요!';
    kw.focus();
    setTimeout(() => { kw.classList.remove('error'); kw.placeholder = '예: 원격지원, 화상회의, 보안'; }, 2500);
    return;
  }

  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div><span>생성 중...</span>';

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('resultState').style.display = 'none';
  document.getElementById('loadingState').style.display = 'block';

  const msgs = [
    'Claude AI가 콘텐츠를 구성하는 중...',
    '브랜드 톤에 맞게 문장을 다듬는 중...',
    '해시태그와 구조를 최적화하는 중...',
    '마무리 검토 중...'
  ];
  let mi = 0;
  const timer = setInterval(() => {
    document.getElementById('loadingMsg').textContent = msgs[Math.min(++mi, msgs.length-1)];
  }, 700);

  // 데모: 1.8초 후 예시 데이터 출력
  setTimeout(() => {
    clearInterval(timer);
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('resultState').style.display = 'block';

    const pool = DEMO_CONTENT[type] || DEMO_CONTENT['고객 사례'];
    const results = [];

    if (channel === 'linkedin' || channel === 'both') {
      results.push({
        id: 'linkedin', label: 'LinkedIn 포스트', icon: '💼',
        badgeCls: 'linkedin-badge', badgeTxt: 'LinkedIn',
        chips: [type, tone+' 톤', target, `키워드: ${keyword}`],
        text: pool.linkedin
      });
    }
    if (channel === 'blog' || channel === 'both') {
      results.push({
        id: 'blog', label: '블로그 포스트', icon: '✍️',
        badgeCls: 'blog-badge', badgeTxt: 'Blog',
        chips: [type, tone+' 톤', target, `키워드: ${keyword}`],
        text: pool.blog
      });
    }

    renderResults(results);
    addHistory(keyword, type, channel);

    btn.disabled = false;
    btn.innerHTML = '<span>✨</span><span>다시 생성</span>';
  }, 1800);
}
</script>
